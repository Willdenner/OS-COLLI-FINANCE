version: "3.9"

services:

  # ──────────────────────────────────────────────
  # AGENTE FP&A — Orquestrador Central
  # ──────────────────────────────────────────────
  fpsa-agent:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: fpsa-agent
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_NAME=fpsa-agent
    volumes:
      - ./core:/app
      - ./shared:/app/shared
      - ./integrations:/app/integrations
      - ./outputs:/app/outputs
      - bank_statements:/app/data/extratos
    depends_on:
      - redis
      - postgres
    networks:
      - colli-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # BOT EXTRATOR — CRM V4 → Sheets → Sistema
  # ──────────────────────────────────────────────
  bot-extrator:
    build:
      context: ./bots/extrator
      dockerfile: Dockerfile
    container_name: bot-extrator
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_NAME=bot-extrator
    volumes:
      - ./bots/extrator:/app
      - ./shared:/app/shared
    depends_on:
      - redis
      - postgres
    networks:
      - colli-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # BOT COBRANÇA — WhatsApp + Régua
  # ──────────────────────────────────────────────
  bot-cobranca:
    build:
      context: ./bots/cobranca
      dockerfile: Dockerfile
    container_name: bot-cobranca
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_NAME=bot-cobranca
    volumes:
      - ./bots/cobranca:/app
      - ./shared:/app/shared
    depends_on:
      - redis
      - postgres
    networks:
      - colli-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # REDIS — Event Bus entre os serviços
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: colli-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - colli-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ──────────────────────────────────────────────
  # POSTGRES — Banco de dados local (opcional se usar Supabase)
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: colli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - colli-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ──────────────────────────────────────────────
  # NGINX — Proxy reverso (health checks e webhooks)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: colli-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt:ro
    depends_on:
      - fpsa-agent
    networks:
      - colli-net

volumes:
  redis_data:
  postgres_data:
  bank_statements:
  certbot_data:

networks:
  colli-net:
    driver: bridge
