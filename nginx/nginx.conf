events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Logs ─────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Servidor principal ────────────────────
    server {
        listen 80;
        server_name _;

        # Redireciona HTTP → HTTPS (ativar após configurar SSL)
        # return 301 https://$host$request_uri;

        # ── Health check público ──────────────
        location /health {
            proxy_pass http://fpsa-agent:8000/health;
            proxy_set_header Host $host;
        }

        # ── Webhooks do WhatsApp (Evolution API) ──
        location /webhook/whatsapp {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://bot-cobranca:8001/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── API interna do agente FP&A ────────
        location /api/ {
            proxy_pass http://fpsa-agent:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── HTTPS (descomentar após certbot) ──────
    # server {
    #     listen 443 ssl;
    #     server_name seu-dominio.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://fpsa-agent:8000;
    #     }
    # }
}
