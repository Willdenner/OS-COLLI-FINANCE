services:
  - type: web
    name: os-colli-finance
    runtime: docker
    dockerfilePath: core/agent/Dockerfile
    dockerContext: core/agent
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE_NAME
        value: os-colli-finance
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - fromGroup: colli-admin-auth
      - key: BOT_DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: CONTA_AZUL_CLIENT_ID
        sync: false
      - key: CONTA_AZUL_CLIENT_SECRET
        sync: false
      - key: CONTA_AZUL_REDIRECT_URI
        sync: false
      - key: CONTA_AZUL_BASE_URL
        sync: false
      - key: CONTA_AZUL_AUTH_URL
        sync: false
      - key: CONTA_AZUL_TOKEN_URL
        sync: false
      - key: CONTA_AZUL_SCOPE
        sync: false
      - key: CONTA_AZUL_CONTRACTS_PATH
        sync: false
      - key: CONTA_AZUL_NEXT_CONTRACT_NUMBER_PATH
        sync: false
      - key: CONTA_AZUL_HEALTH_PATH
        sync: false
      - key: CONTA_AZUL_AUTH_MODE
        sync: false
      - key: CONTA_AZUL_DEFAULT_CONTRACT_ITEM_ID
        sync: false
      - key: CONTA_AZUL_DEFAULT_CONTRACT_CUSTOMER_ID
        sync: false
      - key: CONTA_AZUL_DEFAULT_CONTRACT_FINANCIAL_ACCOUNT_ID
        sync: false
      - key: LOVABLE_WEBHOOK_SECRET
        sync: false
      - key: COLLI_FINANCE_API_TOKEN
        sync: false
      - key: COLLI_FINANCE_CONTRACTS_URL
        sync: false
      - key: COLLI_FINANCE_CLIENTS_URL
        sync: false
      - key: COLLI_FINANCE_BILLING_CARDS_URL
        sync: false
      - key: COLLI_FINANCE_PAYMENTS_URL
        sync: false
      - key: RECEIVABLES_SEND_DELAY_MS
        value: "15000"
      - key: COBRANCAS_URL
        value: https://bot-cobranca-25qf.onrender.com
      - key: COBRANCAS_INTERNAL_URL
        fromService:
          name: bot-cobranca
          type: web
          property: hostport
      - key: EXTRATOR_URL
        value: https://bot-extrator.onrender.com
      - key: EXTRATOR_INTERNAL_URL
        fromService:
          name: bot-extrator
          type: web
          property: hostport

  - type: web
    name: bot-extrator
    runtime: docker
    dockerfilePath: bots/extrator/Dockerfile
    dockerContext: bots/extrator
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE_NAME
        value: bot-extrator
      - key: PORT
        value: "10000"
      - fromGroup: colli-admin-auth
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: LOGIN_EMAIL
        sync: false
      - key: LOGIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: credentials.json
      - key: SPREADSHEET_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: bot-cobranca
    runtime: docker
    dockerfilePath: bots/cobranca/Dockerfile
    dockerContext: bots/cobranca
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: bot-cobranca-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SERVICE_NAME
        value: bot-cobranca
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - fromGroup: colli-admin-auth
      - key: BOT_DATA_DIR
        value: /app/data
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: LOVABLE_WEBHOOK_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_FROM_NAME
        sync: false
      - key: DEFAULT_COUNTRY_CODE
        value: "55"
      - key: MASS_SEND_DELAY_MS
        value: "15000"
      - key: WHATSAPP_CHROMIUM_ARGS
        sync: false

  - type: keyvalue
    name: colli-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

envVarGroups:
  - name: colli-admin-auth
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: colli-postgres
    plan: basic-256mb
    databaseName: colli_finance
    user: colli_admin
