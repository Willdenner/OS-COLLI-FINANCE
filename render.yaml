services:
  - type: web
    name: analista-fpa
    runtime: docker
    dockerfilePath: core/agent/Dockerfile
    dockerContext: core/agent
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE_NAME
        value: analista-fpa
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - fromGroup: colli-admin-auth
      - key: BOT_DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: CONTA_AZUL_CLIENT_ID
        sync: false
      - key: CONTA_AZUL_CLIENT_SECRET
        sync: false
      - key: CONTA_AZUL_REDIRECT_URI
        sync: false
      - key: LOVABLE_WEBHOOK_SECRET
        sync: false
      - key: COBRANCAS_URL
        fromService:
          name: bot-cobranca
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: COBRANCAS_INTERNAL_URL
        fromService:
          name: bot-cobranca
          type: web
          property: hostport
      - key: EXTRATOR_URL
        fromService:
          name: bot-extrator
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: bot-extrator
    runtime: docker
    dockerfilePath: bots/extrator/Dockerfile
    dockerContext: bots/extrator
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE_NAME
        value: bot-extrator
      - key: PORT
        value: "10000"
      - fromGroup: colli-admin-auth
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: LOGIN_EMAIL
        sync: false
      - key: LOGIN_PASSWORD
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: credentials.json
      - key: SPREADSHEET_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: bot-cobranca
    runtime: docker
    dockerfilePath: bots/cobranca/Dockerfile
    dockerContext: bots/cobranca
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: bot-cobranca-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SERVICE_NAME
        value: bot-cobranca
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - fromGroup: colli-admin-auth
      - key: BOT_DATA_DIR
        value: /app/data
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: keyvalue
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: LOVABLE_WEBHOOK_SECRET
        sync: false

  - type: keyvalue
    name: colli-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

envVarGroups:
  - name: colli-admin-auth
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: colli-postgres
    plan: basic-256mb
    databaseName: colli_finance
    user: colli_admin
