services:

  # ==============================================
  # AGENTE FP&A - Orquestrador Central
  # ==============================================
  - type: worker
    name: fpsa-agent
    runtime: docker
    dockerfilePath: core/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: SERVICE_NAME
        value: fpsa-agent
      - key: ANTHROPIC_API_KEY
        sync: false                      # Você preenche no painel do Render
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: CONTA_AZUL_CLIENT_ID
        sync: false
      - key: CONTA_AZUL_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_STAGING_ID
        sync: false
      - key: ALERT_WHATSAPP_NUMBER
        sync: false
      - key: SCHEDULER_TIMEZONE
        value: America/Sao_Paulo
      - key: SALDO_MINIMO_ALERTA
        value: "10000"
      - key: INADIMPLENCIA_ALERTA_PCT
        value: "15"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ==============================================
  # BOT EXTRATOR - CRM V4 -> Sheets -> Sistema
  # ==============================================
  - type: worker
    name: bot-extrator
    runtime: docker
    dockerfilePath: bots/extrator/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: SERVICE_NAME
        value: bot-extrator
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_STAGING_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ==============================================
  # BOT COBRANÇA - WhatsApp + Régua
  # ==============================================
  - type: web
    name: bot-cobranca
    runtime: docker
    dockerfilePath: bots/cobranca/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: SERVICE_NAME
        value: bot-cobranca
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: colli-cobranca
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "10000"                   # Porta padrão do Render

  # ==============================================
  # REDIS - Event Bus
  # ==============================================
  - type: redis
    name: colli-redis
    plan: starter
    ipAllowList: []                      # Só acessível internamente

databases:

  # ==============================================
  # POSTGRES - Banco de dados
  # ==============================================
  - name: colli-postgres
    plan: starter                        # 1GB, backups diários
    databaseName: colli_finance
    user: colli_admin
