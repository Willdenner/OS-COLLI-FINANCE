services:

  # ══════════════════════════════════════════════
  # AGENTE FP&A — Orquestrador Central
  # ══════════════════════════════════════════════
  - type: worker                        # worker = roda em background, sem HTTP
    name: fpsa-agent
    runtime: python
    rootDir: core
    buildCommand: pip install -r requirements.txt
    startCommand: python -m agent.main
    plan: starter                        # Nunca dorme
    envVars:
      - key: SERVICE_NAME
        value: fpsa-agent
      - key: ANTHROPIC_API_KEY
        sync: false                      # Você preenche no painel do Render
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: CONTA_AZUL_CLIENT_ID
        sync: false
      - key: CONTA_AZUL_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_STAGING_ID
        sync: false
      - key: ALERT_WHATSAPP_NUMBER
        sync: false
      - key: SCHEDULER_TIMEZONE
        value: America/Sao_Paulo
      - key: SALDO_MINIMO_ALERTA
        value: "10000"
      - key: INADIMPLENCIA_ALERTA_PCT
        value: "15"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ══════════════════════════════════════════════
  # BOT EXTRATOR — CRM V4 → Sheets → Sistema
  # ══════════════════════════════════════════════
  - type: worker
    name: bot-extrator
    runtime: python
    rootDir: bots/extrator
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: starter
    envVars:
      - key: SERVICE_NAME
        value: bot-extrator
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEETS_STAGING_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ══════════════════════════════════════════════
  # BOT COBRANÇA — WhatsApp + Régua
  # ══════════════════════════════════════════════
  - type: web                            # web = precisa de porta HTTP para webhooks
    name: bot-cobranca
    runtime: python
    rootDir: bots/cobranca
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: starter
    envVars:
      - key: SERVICE_NAME
        value: bot-cobranca
      - key: REDIS_URL
        fromService:
          name: colli-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: colli-postgres
          property: connectionString
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: colli-cobranca
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "10000"                   # Porta padrão do Render

  # ══════════════════════════════════════════════
  # REDIS — Event Bus
  # ══════════════════════════════════════════════
  - type: redis
    name: colli-redis
    plan: starter
    ipAllowList: []                      # Só acessível internamente

databases:

  # ══════════════════════════════════════════════
  # POSTGRES — Banco de dados
  # ══════════════════════════════════════════════
  - name: colli-postgres
    plan: starter                        # 1GB, backups diários
    databaseName: colli_finance
    user: colli_admin
